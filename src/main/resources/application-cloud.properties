# Perfil para despliegue en cloud (Render, Railway, Fly.io)
# Activar con: SPRING_PROFILES_ACTIVE=cloud

spring.application.name=finanz-api

# H2 en memoria: en cloud el disco suele ser efímero
spring.datasource.url=jdbc:h2:mem:finanz-api
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Deshabilitar H2 console en producción (seguridad)
spring.h2.console.enabled=false

# Puerto: Spring Boot usa PORT automáticamente si existe la variable de entorno
