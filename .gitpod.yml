# Gitpod - Ejecuta este proyecto en la nube con un clic
# Los recruiters pueden probar la API sin instalar nada
# https://www.gitpod.io

image: eclipse-temurin:21

tasks:
  - name: Build & Run
    init: ./mvnw -DskipTests compile
    command: ./mvnw spring-boot:run

ports:
  - port: 8080
    onOpen: notify
