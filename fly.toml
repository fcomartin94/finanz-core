# Fly.io - Finanz API
# Despliega con: fly launch (primera vez) o fly deploy

app = "finanz-api"

[build]

[env]
  SPRING_PROFILES_ACTIVE = "cloud"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
